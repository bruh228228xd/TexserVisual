<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NightVisuals | Official Site</title>
    <style>
        @import url('https://googleapis.com');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body { 
            background: #020205; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden;
            animation: siteAppear 2s ease-out forwards;
        }

        @keyframes siteAppear { from { opacity: 0; } to { opacity: 1; } }

        /* --- ВИЗУАЛЫ --- */
        .nebula {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(36, 161, 222, 0.08), transparent 70%);
            z-index: -2; animation: nebulaPulse 8s infinite alternate;
        }
        @keyframes nebulaPulse { from { opacity: 0.4; transform: scale(1); } to { opacity: 0.8; transform: scale(1.1); } }

        #starfield { position: fixed; top: -5%; left: -5%; width: 110%; height: 110%; z-index: -1; transition: transform 0.2s ease-out; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: twinkle var(--d) infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.1; transform: scale(1); } 50% { opacity: 0.9; transform: scale(1.3); } }

        /* --- ГЛАВНЫЙ ЭКРАН --- */
        .hero-section { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding: 40px 20px; }

        .title-container { position: relative; margin-bottom: 50px; display: flex; align-items: center; gap: 25px; cursor: default; }
        
        h1 { 
            font-size: clamp(2.5rem, 10vw, 4.5rem); font-weight: 800; letter-spacing: 10px; text-transform: uppercase;
            background: linear-gradient(90deg, #fff, #24A1DE, #fff, #24A1DE);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleGlow 5s linear infinite, titlePulse 4s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }

        @keyframes titleGlow { to { background-position: 300% center; } }
        @keyframes titlePulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.02); opacity: 1; } }
        
        .moon-icon { 
            width: 40px; height: 35px; box-shadow: -10px 10px 0 0 #fff; border-radius: 50%; 
            transform: rotate(-15deg); margin-bottom: 30px; transition: 0.8s;
            animation: moonFloat 4s ease-in-out infinite;
        }
        @keyframes moonFloat { 0%, 100% { transform: rotate(-15deg) translateY(0); } 50% { transform: rotate(-25deg) translateY(-15px); } }
        .moon-icon.blood-moon { box-shadow: -10px 10px 0 0 #ff0000 !important; filter: drop-shadow(0 0 30px #ff0000) !important; }

        .info-box { 
            background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 35px 60px; border-radius: 35px; text-align: center; 
            max-width: 750px; margin-bottom: 60px; backdrop-filter: blur(20px);
        }

        .button-group { display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%; }
        .btn-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; }

        .link-item { 
            text-decoration: none; color: white; padding: 18px 36px; 
            border-radius: 18px; font-size: 11px; font-weight: 600; 
            text-transform: uppercase; transition: 0.4s; 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); 
            text-align: center; min-width: 240px; letter-spacing: 2px;
        }
        .link-item:hover:not(.disabled) { background: white; color: black; transform: translateY(-7px); }
        .yt:hover { border-color: #ff3333 !important; color: #ff3333 !important; }
        .disabled { opacity: 0.2; cursor: not-allowed; border-style: dashed; }

        /* --- КОНТЕНТ --- */
        .reveal { opacity: 0; transform: translateY(40px); transition: all 1.2s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .content-section { padding: 120px 20px; display: flex; flex-direction: column; align-items: center; background: #020205; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 50px; width: 100%; max-width: 1200px; }
        
        .card { 
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.04); 
            padding: 40px; border-radius: 30px; transition: 0.4s; position: relative;
            backdrop-filter: blur(10px);
        }
        .card:hover { border-color: rgba(36, 161, 222, 0.4); transform: translateY(-10px); }
        .date-label { color: #24A1DE; font-size: 11px; font-weight: 800; margin-bottom: 15px; display: block; }

        .detail-item { 
            background: linear-gradient(145deg, rgba(36, 161, 222, 0.05), rgba(0,0,0,0)); 
            border: 1px solid rgba(36, 161, 222, 0.1); 
            padding: 40px; border-radius: 35px; margin-bottom: 30px; transition: 0.4s;
            width: 100%;
        }

        /* --- АДМИНКА --- */
        #adminPanel { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: min(95vw, 500px); background: rgba(5, 5, 10, 0.98); border: 1px solid #24A1DE; 
            border-radius: 30px; display: none; z-index: 2000; backdrop-filter: blur(25px); overflow: hidden;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }
        .admin-nav { display: flex; background: rgba(255,255,255,0.03); border-bottom: 1px solid #222; }
        .admin-nav-btn { flex: 1; padding: 20px; text-align: center; font-size: 9px; cursor: pointer; color: #444; text-transform: uppercase; font-weight: 800; }
        .admin-nav-btn.active { color: #24A1DE; background: rgba(36, 161, 222, 0.05); }
        .admin-content { padding: 30px; display: none; overflow-y: auto; max-height: 60vh; }
        .admin-content.active { display: block; }
        input, textarea { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; outline: none; font-size: 14px; }
        .admin-main-btn { width: 100%; padding: 15px; background: #24A1DE; border: none; color: white; border-radius: 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        
        .admin-mini-card { 
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; 
        }
        .admin-mini-card span { font-size: 11px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
        .admin-action-group { display: flex; gap: 10px; }
        .admin-action-group button { 
            background: none; border: 1px solid; padding: 4px 8px; 
            border-radius: 5px; cursor: pointer; font-size: 9px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="nebula"></div>
    <div id="starfield"></div>

    <!-- АДМИНКА -->
    <div id="adminPanel">
        <div class="admin-nav">
            <div class="admin-nav-btn active" onclick="switchTab(0)">Status</div>
            <div class="admin-nav-btn" onclick="switchTab(1)">News</div>
            <div class="admin-nav-btn" onclick="switchTab(2)">Plans</div>
            <div class="admin-nav-btn" onclick="switchTab(3)">Details</div>
        </div>
        
        <div class="admin-content active">
            <input type="text" id="editLaunch" placeholder="Дата запуска">
            <input type="text" id="editVer" placeholder="Версия игры">
            <button class="admin-main-btn" onclick="saveSettings()">Save Changes</button>
        </div>

        <div class="admin-content">
            <input type="text" id="newsTitle" placeholder="Заголовок новости">
            <textarea id="newsText" placeholder="Текст..." rows="2"></textarea>
            <input type="text" id="newsDate" placeholder="Дата">
            <input type="hidden" id="newsEditIdx" value="">
            <button class="admin-main-btn" id="newsBtn" onclick="saveItem('news')">Publish</button>
            <div id="adminNewsList" style="margin-top:20px"></div>
        </div>

        <div class="admin-content">
            <input type="text" id="planTitle" placeholder="Цель">
            <textarea id="planText" placeholder="Описание..." rows="2"></textarea>
            <input type="text" id="planDate" placeholder="Срок">
            <input type="hidden" id="planEditIdx" value="">
            <button class="admin-main-btn" id="planBtn" onclick="saveItem('plans')">Add Plan</button>
            <div id="adminPlanList" style="margin-top:20px"></div>
        </div>

        <div class="admin-content">
            <input type="text" id="detailTitle" placeholder="Функция">
            <textarea id="detailText" placeholder="Описание..." rows="3"></textarea>
            <input type="hidden" id="detailEditIdx" value="">
            <button class="admin-main-btn" id="detailBtn" onclick="saveItem('details')">Add Detail</button>
            <div id="adminDetailList" style="margin-top:20px"></div>
        </div>

        <div style="padding: 20px; text-align: center; color: #222; cursor: pointer; font-size: 10px; font-weight: 800;" onclick="document.getElementById('adminPanel').style.display='none'">[ CLOSE ]</div>
    </div>

    <!-- САЙТ -->
    <div class="hero-section">
        <div class="title-container" id="titleBox">
            <h1>NightVisuals</h1>
            <div class="moon-icon" id="moon"></div>
        </div>
        <div class="info-box">
            <h3 style="margin-bottom: 12px; letter-spacing: 3px; text-transform: uppercase; font-size: 13px; color: #24A1DE;">Project Status</h3>
            <p>Сайт будет запущен: <span id="displayLaunch" style="font-weight: 800;">Загрузка...</span><br>
            Версия игры: <span id="displayVersion" style="font-weight: 800;">Загрузка...</span></p>
        </div>
        <div class="button-group">
            <div class="btn-row">
                <a href="#" class="link-item disabled">Скачать (В разработке)</a>
                <a href="https://t.me/NightV1suals" target="_blank" class="link-item">Телеграм Разрободчиков</a>
            </div>
            <div class="btn-row">
                <a href="#" class="link-item disabled yt">YouTube Разработчика</a>
                <a href="https://youtube.com/@DoBRIYTSHEL" target="_blank" class="link-item yt">YouTube Друга</a>
            </div>
        </div>
    </div>

    <div class="content-section">
        <div class="grid-container">
            <div id="newsFeed" class="reveal"> <h2 style="margin-bottom:40px; text-transform:uppercase; letter-spacing:4px;">Новости</h2> </div>
            <div id="plansFeed" class="reveal"> <h2 style="margin-bottom:40px; text-transform:uppercase; letter-spacing:4px;">Планы</h2> </div>
        </div>
        <div class="details-section reveal" style="width: 100%; max-width: 1200px; margin-top: 100px;">
            <h2 style="margin-bottom: 50px; text-transform:uppercase; text-align: center; letter-spacing: 8px;">Подробности</h2>
            <div id="detailsFeed"></div>
        </div>
    </div>

    <script>
        // Параллакс
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.015;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.015;
            document.getElementById('starfield').style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        // Скролл анимация
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                if (reveals[i].getBoundingClientRect().top < window.innerHeight - 100) reveals[i].classList.add("active");
            }
        }
        window.addEventListener("scroll", reveal);

        // Звезды
        const field = document.getElementById('starfield');
        for (let i=0; i<180; i++) {
            const s = document.createElement('div');
            s.className='star'; s.style.width=s.style.height=Math.random()*2+1+'px';
            s.style.top=Math.random()*100+'vh'; s.style.left=Math.random()*100+'vw';
            s.style.setProperty('--d', Math.random()*3+3+'s'); field.appendChild(s);
        }

        // Луна
        const moon = document.getElementById('moon');
        let moonT;
        document.getElementById('titleBox').onmouseenter=()=>{moonT=setTimeout(()=>moon.classList.add('blood-moon'),20000)};
        document.getElementById('titleBox').onmouseleave=()=>{clearTimeout(moonT); moon.classList.remove('blood-moon')};

        // Shift + A
        window.addEventListener('keydown', (e) => {
            if (e.shiftKey && (e.key === 'A' || e.key === 'а' || e.key === 'Ф')) {
                if (prompt("Access Code:") === "VisualNight2026_in_dev_xd") {
                    document.getElementById('adminPanel').style.display = 'block';
                    renderAdmin();
                }
            }
        });

        // БД
        let siteData = JSON.parse(localStorage.getItem('nv_final_db_v8')) || {
            launch: "3 или 4 мая 2026", version: "Еще не подтверждена",
            news: [{ title: "Бета-тест скоро!", text: "Мы готовимся к запуску.", date: "02.05.2026" }],
            plans: [{ title: "Версия мода", text: "Анализируем 1.16.5.", date: "МАЙ 2026" }],
            details: [{ title: "Визуалы", text: "Лучшие настройки неба и анимаций." }]
        };

        function switchTab(idx) {
            const btns = document.querySelectorAll('.admin-nav-btn');
            const contents = document.querySelectorAll('.admin-content');
            btns.forEach((b, i) => b.classList.toggle('active', i === idx));
            contents.forEach((c, i) => c.classList.toggle('active', i === idx));
        }

        function saveSettings() {
            siteData.launch = document.getElementById('editLaunch').value || siteData.launch;
            siteData.version = document.getElementById('editVer').value || siteData.version;
            update();
        }

        function saveItem(type) {
            const prefix = type === 'news' ? 'news' : type === 'plans' ? 'plan' : 'detail';
            const title = document.getElementById(prefix + 'Title').value;
            const text = document.getElementById(prefix + 'Text').value;
            const date = document.getElementById(prefix + 'Date') ? document.getElementById(prefix + 'Date').value : "";
            const idx = document.getElementById(prefix + 'EditIdx').value;

            if(!title || !text) return;

            const item = { title, text, date: date || new Date().toLocaleDateString('ru-RU') };

            if(idx !== "") siteData[type][idx] = item;
            else siteData[type].push(item);

            // Сброс
            document.getElementById(prefix + 'Title').value = "";
            document.getElementById(prefix + 'Text').value = "";
            if(document.getElementById(prefix + 'Date')) document.getElementById(prefix + 'Date').value = "";
            document.getElementById(prefix + 'EditIdx').value = "";
            document.getElementById(prefix + 'Btn').innerText = type === 'news' ? "Publish" : "Add";

            update(); renderAdmin();
        }

        function loadToEdit(type, i) {
            const prefix = type === 'news' ? 'news' : type === 'plans' ? 'plan' : 'detail';
            const item = siteData[type][i];
            document.getElementById(prefix + 'Title').value = item.title;
            document.getElementById(prefix + 'Text').value = item.text;
            if(document.getElementById(prefix + 'Date')) document.getElementById(prefix + 'Date').value = item.date;
            document.getElementById(prefix + 'EditIdx').value = i;
            document.getElementById(prefix + 'Btn').innerText = "SAVE CHANGES";
        }

        function deleteItem(type, idx) { if(confirm("Del?")) { siteData[type].splice(idx, 1); update(); renderAdmin(); } }
        function update() { localStorage.setItem('nv_final_db_v8', JSON.stringify(siteData)); render(); }

        function renderAdmin() {
            ['news', 'plans', 'details'].forEach(type => {
                const listId = type === 'news' ? 'adminNewsList' : type === 'plans' ? 'adminPlanList' : 'adminDetailList';
                const list = document.getElementById(listId);
                list.innerHTML = "";
                siteData[type].forEach((item, i) => {
                    list.insertAdjacentHTML('beforeend', `
                        <div class="admin-mini-card">
                            <span>${item.title}</span>
                            <div class="admin-action-group">
                                <button onclick="loadToEdit('${type}',${i})" style="color:#ffcc00; border-color:#ffcc00">EDIT</button>
                                <button onclick="deleteItem('${type}',${i})" style="color:#ff4444; border-color:#ff4444">DEL</button>
                            </div>
                        </div>`);
                });
            });
        }

        function render() {
            document.getElementById('displayLaunch').innerText = siteData.launch;
            document.getElementById('displayVersion').innerText = siteData.version;
            ['news', 'plans'].forEach(type => {
                const feed = document.getElementById(type+'Feed');
                feed.innerHTML = `<h2 style="margin-bottom:35px; text-transform:uppercase;">${type==='news'?'Новости':'Планы'}</h2>`;
                siteData[type].forEach(item => feed.insertAdjacentHTML('beforeend', `<div class="card"><span class="date-label">${item.date}</span><h4>${item.title}</h4><p style="font-size:13px; color:#888; margin-top:10px;">${item.text}</p></div>`));
            });
            const dFeed = document.getElementById('detailsFeed');
            dFeed.innerHTML = "";
            siteData.details.forEach(item => dFeed.insertAdjacentHTML('beforeend', `<div class="detail-item"><h4>${item.title}</h4><p style="font-size:15px; color:#999; line-height:1.8;">${item.text}</p></div>`));
            reveal();
        }
        render();
    </script>
</body>
</html>
